<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yasu3D</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e14; }
      #app { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-family: ui-monospace, "Cascadia Code", Menlo, monospace;
        color: #e6edf3;
        font-size: 18px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        user-select: none;
        pointer-events: none;
      }
      #hud .big { font-size: 28px; font-weight: 700; }
      #help {
        position: fixed;
        bottom: 16px;
        left: 16px;
        font-family: ui-monospace, "Cascadia Code", Menlo, monospace;
        color: #8b949e;
        font-size: 13px;
        user-select: none;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud">
      <div class="big">Yasu3D</div>
      <div>Coins: <span id="score">0</span> / <span id="total">0</span></div>
      <div id="win" style="color:#3fb950;font-weight:700;"></div>
    </div>
    <div id="help">WASD / Arrows to move &middot; Space to jump &middot; collect the gold coins</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
